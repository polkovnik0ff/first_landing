<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тестовый лендинг</title>

<link rel="stylesheet" href="css/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="header">
<h1>Тестовый лендинг</h1>
<p>Первый сайт через VS Code + Git</p>
<a class="btn" href="#form">Получить консультацию</a>
</header>

<section class="features">

<div class="feature">
<h3>Быстро</h3>
<p>Сайт создается за несколько минут</p>
</div>

<div class="feature">
<h3>Просто</h3>
<p>Минимум кода</p>
</div>

<div class="feature">
<h3>Удобно</h3>
<p>Работа через Git</p>
</div>

</section>

<section class="form-section" id="form">

<h2>Оставить заявку</h2>

<form>

<input type="text" placeholder="Ваше имя">

<input type="tel" placeholder="Телефон">

<button>Отправить</button>

</form>

</section>

<script src="js/script.js"></script>

</body>
</html>
